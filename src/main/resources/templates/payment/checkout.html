<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 - MockerView</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .header {
            background: #667eea;
            color: white;
            padding: 32px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 32px;
        }
        
        .plan-info {
            background: #f8f9fa;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        
        .plan-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        
        .plan-price {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        .method-section {
            margin-bottom: 24px;
        }
        
        .method-section h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #333;
            font-weight: 600;
        }
        
        .method-grid {
            display: flex;
            gap: 8px;
        }
        
        .method-btn {
            flex: 1;
            padding: 14px 8px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .method-btn:hover {
            border-color: #667eea;
        }
        
        .method-btn.active {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }
        
        .method-icon {
            font-size: 20px;
        }
        
        .btn-pay {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-pay:hover {
            background: #5568d3;
        }
        
        .btn-cancel {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: white;
            color: #666;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-cancel:hover {
            background: #f8f9fa;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 0;
            }
            
            .container {
                border-radius: 0;
            }
            
            .content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>결제하기</h1>
            <p>MockerView</p>
        </div>
        
        <div class="content">
            <div class="plan-info">
                <div class="plan-name" th:text="${orderName}">PRO 플랜</div>
                <div class="plan-price" th:text="'₩' + ${#numbers.formatInteger(amount, 0, 'COMMA')}">₩29,900</div>
            </div>
            
            <div class="method-section">
                <h3>결제 수단</h3>
                <div class="method-grid">
                    <button class="method-btn active" onclick="selectMethod('카드', this)">
                        <span class="method-icon">💳</span>
                        <span>카드</span>
                    </button>
                    <button class="method-btn" onclick="selectMethod('가상계좌', this)">
                        <span class="method-icon">🏦</span>
                        <span>가상계좌</span>
                    </button>
                    <button class="method-btn" onclick="selectMethod('휴대폰', this)">
                        <span class="method-icon">📱</span>
                        <span>휴대폰</span>
                    </button>
                </div>
            </div>
            
            <button class="btn-pay" onclick="requestPayment()">결제하기</button>
            <button class="btn-cancel" onclick="location.href='/'">취소</button>
        </div>
    </div>
    
    <script th:inline="javascript">
        const clientKey = /*[[${tossClientKey}]]*/ '';
        const orderId = /*[[${orderId}]]*/ '';
        const amount = /*[[${amount}]]*/ 0;
        const orderName = /*[[${orderName}]]*/ '';
        const customerName = /*[[${customerName}]]*/ '';
        
        const tossPayments = TossPayments(clientKey);
        let selectedMethod = '카드';
        
        function selectMethod(method, btn) {
            selectedMethod = method;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        async function requestPayment() {
            try {
                await tossPayments.requestPayment(selectedMethod, {
                    amount: amount,
                    orderId: orderId,
                    orderName: orderName,
                    customerName: customerName,
                    successUrl: window.location.origin + '/payment/success',
                    failUrl: window.location.origin + '/payment/fail',
                });
            } catch (error) {
                console.error('결제 오류:', error);
                alert('결제 중 오류가 발생했습니다.');
            }
        }
    </script>
</body>
</html>
