<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 - Mockerview</title>
    <script src="https://js.tosspayments.com/v1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }
        
        h1 {
            font-size: clamp(28px, 4vw, 36px);
            margin-bottom: 32px;
            color: #0a0a0a;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .order-info {
            background: #fafafa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .order-info p {
            margin: 12px 0;
            color: #666;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .order-info strong {
            color: #0a0a0a;
            font-weight: 600;
        }
        
        .btn-pay {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-pay:hover {
            background: #5568d3;
        }
        
        .btn-pay:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 결제하기</h1>
        <div class="order-info">
            <p><strong>상품명</strong> <span th:text="${orderName}"></span></p>
            <p><strong>결제 금액</strong> <span th:text="${#numbers.formatInteger(amount, 0, 'COMMA')} + '원'"></span></p>
            <p><strong>주문번호</strong> <span th:text="${orderId}"></span></p>
        </div>
        
        <button id="payment-button" class="btn-pay">카드 결제</button>
    </div>
    
    <script th:inline="javascript">
        const clientKey = /*[[${tossClientKey}]]*/ '';
        const tossPayments = TossPayments(clientKey);
        
        document.getElementById('payment-button').addEventListener('click', function() {
            tossPayments.requestPayment('카드', {
                amount: /*[[${amount}]]*/ 0,
                orderId: /*[[${orderId}]]*/ '',
                orderName: /*[[${orderName}]]*/ '',
                customerName: /*[[${customerName}]]*/ '',
                successUrl: window.location.origin + '/payment/success',
                failUrl: window.location.origin + '/payment/fail'
            }).catch(function(error) {
                if (error.code === 'USER_CANCEL') {
                    alert('결제를 취소하셨습니다.');
                } else {
                    alert('결제 중 오류가 발생했습니다.');
                }
            });
        });
    </script>
</body>
</html>
