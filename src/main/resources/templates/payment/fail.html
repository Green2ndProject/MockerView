<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 실패 - MockerView</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 48px 32px;
            text-align: center;
        }
        
        .fail-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 12px;
        }
        
        p {
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
            margin: 0 8px;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-outline:hover {
            background: #f0f4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="fail-icon">❌</div>
        <h1>결제에 실패했습니다</h1>
        <p th:text="${message}">결제 처리 중 문제가 발생했습니다.</p>
        <a href="/payment/plans" class="btn">다시 시도</a>
        <a href="/" class="btn btn-outline">홈으로</a>
    </div>
</body>
</html>
