<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - MockerView</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafbfc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 520px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo a {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .register-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0a0a0a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .register-header p {
            font-size: 0.9375rem;
            color: #6b7280;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.9375rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            transition: all 0.2s;
            font-family: 'Pretendard', sans-serif;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .form-input::placeholder {
            color: #9ca3af;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .role-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 8px;
        }
        
        .role-option {
            position: relative;
        }
        
        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }
        
        .role-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .role-option input[type="radio"]:checked + .role-label {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .role-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .role-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        
        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        
        .footer-links {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
        }
        
        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        @media (max-width: 768px) {
            .register-container {
                max-width: 480px;
            }
        }
        
        @media (max-width: 600px) {
            .role-selection {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .register-card {
                padding: 36px 24px;
            }
            
            .register-header h1 {
                font-size: 1.5rem;
            }
            
            .logo a {
                font-size: 1.75rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-input,
            .btn-submit {
                padding: 12px 14px;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <a href="/">MockerView</a>
        </div>
        
        <div class="register-card">
            <div class="register-header">
                <h1>회원가입</h1>
                <p>MockerView와 함께 면접 준비를 시작하세요</p>
            </div>
            
            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}">오류 메시지</span>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">아이디</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input"
                        placeholder="아이디 (4자 이상)"
                        required
                        minlength="4"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input"
                        placeholder="비밀번호 (8자 이상)"
                        required
                        minlength="8"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">비밀번호 확인</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input"
                        placeholder="비밀번호를 다시 입력하세요"
                        required
                    >
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="name">이름</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            class="form-input"
                            placeholder="이름"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">이메일</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input"
                            placeholder="이메일"
                            required
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">역할 선택</label>
                    <div class="role-selection">
                        <div class="role-option">
                            <input type="radio" id="roleStudent" name="role" value="STUDENT" checked>
                            <label for="roleStudent" class="role-label">
                                <div class="role-icon">🎓</div>
                                <div class="role-name">면접자</div>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="roleHost" name="role" value="HOST">
                            <label for="roleHost" class="role-label">
                                <div class="role-icon">👔</div>
                                <div class="role-name">면접관</div>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="roleReviewer" name="role" value="REVIEWER">
                            <label for="roleReviewer" class="role-label">
                                <div class="role-icon">📝</div>
                                <div class="role-name">리뷰어</div>
                            </label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">가입하기</button>
            </form>
            
            <div class="footer-links">
                이미 계정이 있으신가요? <a href="/auth/login">로그인</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            
            const formData = {
                username: document.getElementById('username').value,
                password: password,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                role: document.querySelector('input[name="role"]:checked').value
            };
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    alert('회원가입이 완료되었습니다!');
                    window.location.href = '/auth/login';
                } else {
                    const error = await response.text();
                    alert(error || '회원가입에 실패했습니다.');
                }
            } catch (error) {
                console.error('Register error:', error);
                alert('회원가입 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
